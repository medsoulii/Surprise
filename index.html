<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Special Invitation</title>
  
  <!-- Romantic Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f7f3ef;
      color: #4a4238;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Phone Preview Frame Container */
    .app-container {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #faf6f0;
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    /* --- Interactive Reveal Overlay (Wax Seal) --- */
    .envelope-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #d3c3b3, #beaa98);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
      cursor: pointer;
      text-align: center;
      padding: 20px;
    }

    .envelope-overlay.opened {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    .wax-seal {
      width: 110px;
      height: 110px;
      background: radial-gradient(circle at 30% 30%, #a83232, #681818);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.3);
      color: #d4af37;
      font-family: 'Alex Brush', cursive;
      font-size: 2.2rem;
      border: 3px dashed #8b2222;
      animation: pulse 2s infinite;
      margin-bottom: 20px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .tap-hint {
      color: #ffffff;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* --- Main Content Sections --- */
    .content {
      padding: 40px 25px;
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s ease 0.5s;
    }

    .content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .subtitle {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #8c7a6b;
      margin-bottom: 10px;
    }

    .names {
      font-family: 'Alex Brush', cursive;
      font-size: 3.5rem;
      color: #5c4333;
      margin-bottom: 15px;
      line-height: 1.1;
    }

    .divider {
      width: 60px;
      height: 1px;
      background-color: #c5b4a5;
      margin: 20px auto;
    }

    .message {
      font-size: 1.25rem;
      font-style: italic;
      line-height: 1.6;
      color: #6b5c50;
      margin-bottom: 30px;
    }

    /* Card Details Box */
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 25px 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      border: 1px solid #ebdcd0;
    }

    .card h3 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: #4a4238;
      font-weight: 600;
    }

    .card p {
      font-size: 1.1rem;
      color: #786a5e;
      margin-bottom: 5px;
    }

    /* Countdown Timer Styling */
    .countdown-container {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .time-box span:first-child {
      font-size: 1.8rem;
      font-weight: bold;
      color: #5c4333;
    }

    .time-box span:last-child {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9c8b7d;
    }

    /* RSVP Form Elements */
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #dcd1c4;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }

    button {
      background-color: #5c4333;
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      letter-spacing: 1px;
      transition: background 0.3s ease;
      margin-top: 5px;
    }

    button:hover {
      background-color: #433024;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Step 1: Wax Seal Envelope Overlay -->
    <div class="envelope-overlay" id="envelope" onclick="openInvitation()">
      <div class="wax-seal">A & B</div>
      <div class="tap-hint">Tap to Open</div>
    </div>

    <!-- Step 2: Main Invitation Content -->
    <div class="content" id="mainContent">
      <p class="subtitle">You Are Invited To Celebrate</p>
      <h1 class="names">Alex & Taylor</h1>
      <p style="font-size: 1.2rem; letter-spacing: 2px;">JULY 15, 2027</p>

      <div class="divider"></div>

      <p class="message">
        "Two souls with but a single thought,<br>two hearts that beat as one."
      </p>

      <!-- Countdown Card -->
      <div class="card">
        <h3>Countdown to the Big Day</h3>
        <div class="countdown-container">
          <div class="time-box"><span id="days">00</span><span>Days</span></div>
          <div class="time-box"><span id="hours">00</span><span>Hours</span></div>
          <div class="time-box"><span id="minutes">00</span><span>Mins</span></div>
          <div class="time-box"><span id="seconds">00</span><span>Secs</span></div>
        </div>
      </div>

      <!-- Event Details Card -->
      <div class="card">
        <h3>Location & Time</h3>
        <p><strong>The Grand Villa</strong></p>
        <p>123 Fairytale Lane, Paris, France</p>
        <p style="margin-top: 8px;"><strong>Ceremony:</strong> 4:00 PM</p>
      </div>

      <!-- RSVP Card -->
      <div class="card">
        <h3>RSVP</h3>
        <form onsubmit="handleRSVP(event)">
          <input type="text" placeholder="Your Full Name" required />
          <select required>
            <option value="" disabled selected>Will you attend?</option>
            <option value="yes">Joyfully Accepts</option>
            <option value="no">Regretfully Declines</option>
          </select>
          <button type="submit">Send Confirmation</button>
        </form>
      </div>
    </div>

  </div>

  <script>
    // Reveal Opening Animation
    function openInvitation() {
      document.getElementById('envelope').classList.add('opened');
      document.getElementById('mainContent').classList.add('visible');
    }

    // Countdown Timer Script
    // Set your target date here (YYYY-MM-DD format)
    const targetDate = new Date("July 15, 2027 16:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const difference = targetDate - now;

      if (difference > 0) {
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days < 10 ? "0" + days : days;
        document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
        document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
      }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // Form submission confirmation alert
    function handleRSVP(e) {
      e.preventDefault();
      alert("Thank you for your RSVP! We can't wait to celebrate with you.");
    }
  </script>
</body>
</html>
